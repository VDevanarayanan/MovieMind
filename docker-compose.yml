version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moviemind_user
      POSTGRES_PASSWORD: moviemind_pass
      POSTGRES_DB: moviemind
    volumes:
      - moviemind_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  moviemind_data:
