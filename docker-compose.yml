version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moviemind_user
      POSTGRES_PASSWORD: moviemind_pass
      POSTGRES_DB: moviemind
    volumes:
      - moviemind_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://moviemind_user:moviemind_pass@db:5432/moviemind
      JWT_SECRET: changeme
      TMDB_API_KEY: your_tmdb_api_key
      GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
      GEMINI_API_KEY: your_gemini_api_key
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  moviemind_data:
